<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>STUDIO</title>
    <link rel="manifest" href="manifest.json">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <style>
        :root { --nc: #00ffff; --eb: #2e5bff; --bg: #000; --panel: rgba(10, 10, 10, 0.98); }
        * { margin: 0; padding: 0; box-sizing: border-box; user-select: none; -webkit-user-select: none; touch-action: none; font-family: monospace; }
        body { background: var(--bg); height: 100dvh; width: 100vw; overflow: hidden; }
        #viewport { position: absolute; top: 0; left: 0; width: 100%; height: 100%; transform-origin: 0 0; }
        canvas { position: absolute; top: 0; left: 0; display: block; }
        #temp-canvas { z-index: 20; }
        .dock { position: fixed; bottom: 60px; left: 50%; transform: translateX(-50%); z-index: 9999; display: flex; gap: 15px; padding: 15px 25px; background: var(--panel); border: 1px solid #333; border-radius: 60px; box-shadow: 0 0 20px rgba(0,0,0,0.8); }
        .btn { width: 65px; height: 50px; border-radius: 25px; border: 1px solid #333; background: #222; display: flex; align-items: center; justify-content: center; color: #666; font-size: 11px; font-weight: 900; transition: 0.2s; cursor: pointer; }
        .btn.active { border-color: var(--nc); color: var(--nc); box-shadow: 0 0 35px rgba(0, 255, 255, 0.4); }
        .btn.qsave-active { border-color: var(--eb)!important; color: var(--eb)!important; box-shadow: 0 0 35px var(--eb)!important; }
        .overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.95); z-index: 2000; display: none; flex-direction: column; align-items: center; justify-content: center; }
        .grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 15px; width: 90%; max-width: 400px; }
        .g-btn { aspect-ratio: 1; background: #111; border: 1px solid #333; display: flex; align-items: center; justify-content: center; color: #fff; font-size: 10px; cursor: pointer; text-align: center; }
        .g-btn:active { background: var(--nc); color: #000; }
        .m-list { width: 80%; max-width: 300px; display: flex; flex-direction: column; gap: 10px; }
        .m-row { display: flex; gap: 10px; width: 100%; }
        .m-item { flex: 1; padding: 20px; background: #111; border: 1px solid #444; color: #fff; text-align: center; font-size: 12px; cursor: pointer; }
        .r-colors { display: flex; gap: 5px; margin-top: 20px; width: 90%; max-width: 400px; overflow-x: auto; padding: 10px 0; border-top: 1px solid #333; }
        .swatch { width: 30px; height: 30px; border-radius: 5px; border: 1px solid #fff; flex-shrink: 0; cursor: pointer; }
        .v-wrap { display: flex; flex-direction: column; gap: 20px; width: 100%; max-height: 90vh; overflow-y: auto; align-items: center; padding-bottom: 20px; }
        .v-box { width: 90%; max-width: 300px; border: 1px solid #333; background: #050505; position: relative; }
        .v-img { width: 100%; height: 25vh; object-fit: contain; border-bottom: 1px solid #333; background: #000; }
        .v-bar { display: flex; height: 40px; }
        .v-bar div { flex: 1; display: flex; align-items: center; justify-content: center; font-size: 10px; color: #fff; border-right: 1px solid #333; cursor: pointer; }
        .v-bar div:active { background: var(--nc); color: #000; }
        .panel { background: var(--panel); border: 1px solid #333; padding: 20px; border-radius: 20px; width: 90%; max-width: 400px; display: flex; flex-direction: column; align-items: center; gap: 15px; color: #888; font-size: 10px; }
        input[type="range"] { width: 100%; }
    </style>
</head>
<body>

<div id="viewport">
    <canvas id="main-canvas"></canvas>
    <canvas id="temp-canvas"></canvas>
</div>

<div class="dock">
    <div class="btn" id="btn-menu" onclick="handleDockTap('menu')">MENU</div>
    <div class="btn" id="btn-edit" style="display:none"></div>
    <div class="btn" id="btn-custom" onclick="handleDockTap('custom')">CUSTOM</div>
    <div class="btn" id="btn-qsave" onclick="triggerQSave()">QSAVE</div>
</div>

<div class="overlay" id="overlay-menu">
    <div class="m-list">
        <div class="m-row"><div class="m-item" onclick="setMode('edit')">EDIT</div><div class="m-item" onclick="switchOverlay('color')">BRUSH</div></div>
        <div class="m-row"><div class="m-item" onclick="loadFile('load')">LOAD</div><div class="m-item" onclick="loadFile('import')">IMPORT</div></div>
        <div class="m-item" onclick="switchOverlay('tools')">TOOLS</div>
        <div class="m-item" onclick="switchOverlay('vault')">VAULTS</div>
    </div>
</div>

<div class="overlay" id="overlay-color">
    <div class="panel">
        <canvas id="brush-preview" width="80" height="80" style="border-radius:50%; border:2px solid #fff;"></canvas>
        <input type="color" id="native-color" value="#00ffff" style="width:100%; height:50px; background:none; border:none; cursor:pointer;">
        <div style="margin-top:-10px;">TAP COLOR ABOVE</div>
        <div style="width:100%; text-align:left;">BRUSH SIZE</div><input type="range" id="slider-size" min="1" max="100" value="20">
        <div style="width:100%; text-align:left;">DARK TO LIGHT</div><input type="range" id="slider-lightness" min="-50" max="50" value="0">
        <div style="width:100%; text-align:left;">GLOW</div><input type="range" id="slider-glow" min="0" max="50" value="0">
        <div class="btn" style="width:100%; border-color:#444;" onclick="switchOverlay('menu')">BACK</div>
    </div>
</div>

<div class="overlay" id="overlay-custom">
    <div class="m-list">
        <div class="m-row"><div class="m-item" onclick="setMode('edit')">FAV 1: EDIT</div><div class="m-item" onclick="applyTool('STICKER')">FAV 2: STICKER</div></div>
        <div class="m-row"><div class="m-item" onclick="applyTool('TEXT')">FAV 3: TEXT</div><div class="m-item" onclick="triggerSave()">FAV 4: SAVE</div></div>
        <div class="m-item" onclick="switchOverlay('menu')">BACK</div>
    </div>
</div>

<div class="overlay" id="overlay-tools">
    <div class="grid">
        <div class="g-btn" onclick="applyTool('STICKER')">STICKER</div><div class="g-btn" onclick="applyTool('ERASER')">ERASER</div><div class="g-btn" onclick="applyTool('UNDO')">UNDO</div>
        <div class="g-btn" onclick="applyTool('SMOOTH')">SMOOTH</div><div class="g-btn" onclick="applyTool('TEXT')">TEXT</div><div class="g-btn" onclick="applyTool('CUT')">CUT</div>
        <div class="g-btn" onclick="applyTool('COPY')">COPY</div><div class="g-btn" onclick="applyTool('PASTE')">PASTE</div><div class="g-btn" onclick="applyTool('FILL')">FILL</div>
        <div class="g-btn" onclick="applyTool('PICKER')">PICKER</div><div class="g-btn" onclick="triggerAI()">PH...AI</div><div class="g-btn" onclick="switchOverlay('menu')">BACK</div>
    </div>
    <div class="r-colors" id="recent-colors-box"></div>
</div>

<div class="overlay" id="overlay-vault">
    <div class="v-wrap" id="vault-list"></div>
</div>

<script>
// UTILS & STATE
const $ = id => document.getElementById(id), $$ = q => document.querySelectorAll(q);
const app = { activeMode: null, activeTool: null, loadedName: "export", penColor: '#00ffff', penSize: 20, glow: 0, baseHex: '#00ffff', recentColors: [], undo: [], vaults: [null, null], vaultIdx: 0, panX: 0, panY: 0, scale: 1, internalClipboard: null };
const viewport = $('viewport'), main = $('main-canvas'), temp = $('temp-canvas'), mctx = main.getContext('2d'), tctx = temp.getContext('2d');

function init() {
    main.width = temp.width = innerWidth; main.height = temp.height = innerHeight;
    main.style.width = temp.style.width = innerWidth + 'px'; main.style.height = temp.style.height = innerHeight + 'px';
    mctx.lineCap = tctx.lineCap = mctx.lineJoin = tctx.lineJoin = 'round';
    
    let vHtml = ''; 
    for(let i=0; i<2; i++) {
        app.vaults[i] = localStorage.getItem('v'+i);
        vHtml += `<div class="v-box"><span style="position:absolute; margin:5px; font-size:10px; color:#888; font-weight:bold;">VAULT ${i+1}</span><img class="v-img" id="img-v${i}" src="${app.vaults[i]||''}"><div class="v-bar"><div onclick="vaultAct(${i},'load')">LOAD</div><div onclick="vaultAct(${i},'save')">SAVE AS</div><div onclick="setMode(null)">EXIT</div></div></div>`;
    }
    $('vault-list').innerHTML = vHtml; updateColor(); pushUndo('init');

    if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
            navigator.serviceWorker.register('sw.js').catch(err => console.log("SW failed", err));
        });
    }
}

// NAVIGATION
function setMode(m) {
    $$('.btn').forEach(b => b.classList.remove('active')); $$('.overlay').forEach(o => o.style.display = 'none');
    app.activeMode = m; app.activeTool = (m === 'edit') ? 'PAINTBRUSH' : null;
    if(m === 'menu' || m === 'custom') { $(`btn-${m}`).classList.add('active'); switchOverlay(m); }
    else if(m === 'edit') $('btn-edit').classList.add('active');
}

function handleDockTap(m) {
    const btn = $('btn-menu');
    if(m === 'menu' && btn.innerText !== 'MENU' && btn.innerText !== 'THINKING...') { btn.innerText = 'MENU'; setMode('menu'); switchOverlay('tools'); return; }
    if(app.activeMode === m) { setMode(null); if(m === 'menu') btn.innerText = 'MENU'; }
    else if(!app.activeMode || app.activeMode === 'edit') setMode(m);
}

function switchOverlay(to) { $$('.overlay').forEach(o => o.style.display = 'none'); if(to !== 'none') $(`overlay-${to}`).style.display = 'flex'; }

function applyTool(t) {
    if(t === 'UNDO') return performUndo();
    app.activeTool = t; $('btn-menu').innerText = t; switchOverlay('none');
    if(t === 'STICKER') loadFile('sticker');
}

// UNIFIED FILE LOADER
function loadFile(type) {
    const inp = document.createElement('input'); inp.type = 'file'; inp.accept = 'image/*';
    inp.onchange = e => {
        const file = e.target.files[0]; if(!file) return;
        if(type === 'load') app.loadedName = file.name.split('.')[0];
        const reader = new FileReader();
        reader.onload = ev => {
            const img = new Image();
            img.onload = () => {
                if(type === 'load') {
                    main.width = temp.width = img.width; main.height = temp.height = img.height;
                    main.style.width = temp.style.width = img.width+'px'; main.style.height = temp.style.height = img.height+'px';
                    app.scale = Math.min(innerWidth/img.width, innerHeight/img.height) * 0.9;
                    app.panX = (innerWidth - img.width * app.scale) / 2; app.panY = (innerHeight - img.height * app.scale) / 2;
                    viewport.style.transform = `translate(${app.panX}px, ${app.panY}px) scale(${app.scale})`;
                    mctx.clearRect(0, 0, main.width, main.height); mctx.drawImage(img, 0, 0);
                } else {
                    const rect = temp.getBoundingClientRect();
                    const cx = (innerWidth/2 - rect.left) / app.scale, cy = (innerHeight/2 - rect.top) / app.scale;
                    const r = Math.min((innerWidth/app.scale)/img.width, (innerHeight/app.scale)/img.height) * (type==='import'?0.8:1);
                    tctx.drawImage(img, cx - (img.width*r)/2, cy - (img.height*r)/2, img.width*r, img.height*r);
                }
                pushUndo(type); setMode(null);
            };
            img.src = ev.target.result;
        };
        reader.readAsDataURL(file);
    };
    inp.click();
}

// COLORS
function updateColor() {
    app.penSize = +$('slider-size').value; app.glow = +$('slider-glow').value; const l = +$('slider-lightness').value;
    app.penColor = `color-mix(in srgb, ${app.baseHex}, ${l<0?'black':'white'} ${Math.abs(l)}%)`;
    const c = $('brush-preview'), ctx = c.getContext('2d');
    ctx.clearRect(0,0,c.width,c.height); ctx.beginPath(); ctx.arc(40,40,app.penSize/2,0,Math.PI*2);
    ctx.fillStyle = ctx.shadowColor = app.penColor; ctx.shadowBlur = app.glow; ctx.fill();
}
$('native-color').oninput = e => { app.baseHex = e.target.value; updateColor(); };
['size','lightness','glow'].forEach(id => $(`slider-${id}`).oninput = updateColor);

function addColor(c) {
    if(app.recentColors[0] === c) return;
    app.recentColors = [c, ...app.recentColors.filter(x => x !== c)].slice(0,10);
    $('recent-colors-box').innerHTML = app.recentColors.map(x => `<div class="swatch" style="background:${x}" onclick="app.penColor='${x}';setMode(null)"></div>`).join('');
}

// TOUCH EVENTS
let isDraw=false, isPan=false, sx=0, sy=0, dist=0, px=0, py=0, lx=0, ly=0;
const getC = e => { const t = e.touches?e.touches[0]:e, r = temp.getBoundingClientRect(); return { x: (t.clientX-r.left)/app.scale, y: (t.clientY-r.top)/app.scale }; };

viewport.addEventListener('touchstart', e => {
    const t = app.activeTool, m = app.activeMode, c = getC(e);
    if((m === 'edit' || (m === 'menu' && t === 'ERASER')) && e.touches.length === 1) { isDraw=true; lx=c.x; ly=c.y; return; }
    if(m === 'menu' && t && t !== 'STICKER') {
        if(t === 'PICKER') { const p = mctx.getImageData(c.x, c.y, 1, 1).data; app.penColor=`rgb(${p[0]},${p[1]},${p[2]})`; updateColor(); }
        else if(t === 'TEXT') { const txt=prompt("Text:"); if(txt){ tctx.font=`${app.penSize*2}px monospace`; tctx.fillStyle=app.penColor; tctx.fillText(txt,c.x,c.y); pushUndo('text'); } }
        else if(t === 'PASTE' && app.internalClipboard) { mctx.putImageData(app.internalClipboard, c.x, c.y); pushUndo('paste'); setMode(null); }
        else if(t === 'FILL') { tctx.fillStyle=app.penColor; tctx.fillRect(0,0,temp.width,temp.height); pushUndo('fill'); }
        else if(t === 'CUT' || t === 'COPY') { window.dx=c.x; window.dy=c.y; isDraw=true; }
        else if(t === 'SMOOTH') { isDraw=true; lx=c.x; ly=c.y; }
        return;
    }
    if(m === 'edit') return;
    if(e.touches.length === 1) { isPan=true; sx = e.touches[0].clientX-app.panX; sy = e.touches[0].clientY-app.panY; }
    else if(e.touches.length === 2) { isPan=false; dist = Math.hypot(e.touches[0].clientX-e.touches[1].clientX, e.touches[0].clientY-e.touches[1].clientY); px = (e.touches[0].clientX+e.touches[1].clientX)/2; py = (e.touches[0].clientY+e.touches[1].clientY)/2; }
}, {passive:false});

viewport.addEventListener('touchmove', e => {
    e.preventDefault(); const t = app.activeTool, m = app.activeMode, c = getC(e);
    if(isDraw) {
        if(t === 'CUT' || t === 'COPY') {
            tctx.clearRect(0,0,temp.width,temp.height); tctx.strokeStyle='#0ff'; tctx.setLineDash([5,5]); tctx.lineWidth=2/app.scale;
            tctx.strokeRect(window.dx, window.dy, c.x-window.dx, c.y-window.dy); tctx.setLineDash([]);
        } else {
            tctx.lineCap='round'; tctx.lineWidth=app.penSize/app.scale;
            if(m === 'menu' && t === 'ERASER') tctx.globalCompositeOperation='destination-out';
            else { tctx.globalCompositeOperation='source-over'; tctx.strokeStyle=app.penColor; }
            if(t === 'SMOOTH') { tctx.filter='blur(4px)'; tctx.strokeStyle='rgba(255,255,255,0.1)'; }
            tctx.beginPath(); tctx.moveTo(lx,ly); tctx.lineTo(c.x,c.y); tctx.stroke(); tctx.filter='none'; lx=c.x; ly=c.y;
        }
        return;
    }
    if(m === 'edit' || m === 'menu') return;
    if(e.touches.length === 1 && isPan) { app.panX = e.touches[0].clientX-sx; app.panY = e.touches[0].clientY-sy; }
    else if(e.touches.length === 2 && dist>0) {
        const nd = Math.hypot(e.touches[0].clientX-e.touches[1].clientX, e.touches[0].clientY-e.touches[1].clientY), ns = Math.min(Math.max(0.2, app.scale*(nd/dist)), 145);
        app.panX = px - (px-app.panX)*(ns/app.scale); app.panY = py - (py-app.panY)*(ns/app.scale); app.scale = ns; dist = nd;
        px = (e.touches[0].clientX+e.touches[1].clientX)/2; py = (e.touches[0].clientY+e.touches[1].clientY)/2;
    }
    viewport.style.transform = `translate(${app.panX}px, ${app.panY}px) scale(${app.scale})`;
}, {passive:false});

window.addEventListener('touchend', e => {
    if(isDraw) {
        isDraw=false; const t = app.activeTool;
        if(t === 'CUT' || t === 'COPY') {
            const c = getC(e.changedTouches[0]), w=c.x-window.dx, h=c.y-window.dy; tctx.clearRect(0,0,temp.width,temp.height);
            if(Math.abs(w)>5 && Math.abs(h)>5) { app.internalClipboard = mctx.getImageData(window.dx, window.dy, w, h); if(t === 'CUT') { mctx.clearRect(window.dx, window.dy, w, h); pushUndo('cut'); } }
            setMode(null);
        } else { pushUndo('stroke'); addColor(app.penColor); }
    }
    isPan=false;
});

// VAULTS & UNDO
function pushUndo(type) { if(app.undo.length>=3) app.undo.shift(); app.undo.push({ type, d: temp.toDataURL() }); }
function performUndo() {
    if(app.undo.length<=1) return; const u = app.undo.pop(), p = app.undo[app.undo.length-1];
    if(u.type === 'qsave' && app.vaults[app.vaultIdx]) { const mImg = new Image(); mImg.onload=()=>{mctx.clearRect(0,0,main.width,main.height); mctx.drawImage(mImg,0,0);}; mImg.src = app.vaults[app.vaultIdx]; }
    const tImg = new Image(); tImg.onload=()=>{tctx.clearRect(0,0,temp.width,temp.height); tctx.drawImage(tImg,0,0);}; tImg.src = p.d;
}

function triggerSave() { 
    const l = document.createElement('a'); 
    l.download = app.loadedName+'.png'; 
    mctx.drawImage(temp,0,0); 
    tctx.clearRect(0,0,temp.width,temp.height);
    l.href = main.toDataURL(); 
    l.click(); 
}
function triggerQSave() {
    mctx.drawImage(temp,0,0); tctx.clearRect(0,0,temp.width,temp.height); pushUndo('qsave');
    app.vaults[app.vaultIdx] = main.toDataURL('image/jpeg',0.8); localStorage.setItem('v'+app.vaultIdx, app.vaults[app.vaultIdx]);
    $(`img-v${app.vaultIdx}`).src = app.vaults[app.vaultIdx]; app.vaultIdx = (app.vaultIdx+1)%2;
    const b = $('btn-qsave'); b.classList.add('qsave-active'); setTimeout(()=>b.classList.remove('qsave-active'), 2000);
}
function vaultAct(i, act) {
    const d = app.vaults[i]; if(!d) return;
    if(act === 'load') { const img = new Image(); img.onload=()=>{mctx.clearRect(0,0,main.width,main.height); mctx.drawImage(img,0,0); tctx.clearRect(0,0,temp.width,temp.height); pushUndo('load'); setMode(null);}; img.src=d; }
    else { const l = document.createElement('a'); l.download = `Vault_${i+1}.png`; l.href = d; l.click(); }
}

// AI INTEGRATION
function getApiKey() {
    let key = localStorage.getItem('saved_api_key');
    if (!key) {
        key = prompt("Please enter your Google Gemini API Key:");
        if (key) localStorage.setItem('saved_api_key', key);
    }
    return key;
}

async function triggerAI() {
    const apiKey = getApiKey();
    if (!apiKey) return alert("AI canceled. API key required.");

    const userPrompt = prompt("Ask the AI about your drawing:", "What does this look like?");
    if (!userPrompt) return;

    $('btn-menu').innerText = 'THINKING...';
    switchOverlay('none');

    try {
        const snap = document.createElement('canvas');
        snap.width = temp.width; snap.height = temp.height;
        const sctx = snap.getContext('2d');
        sctx.fillStyle = '#ffffff'; sctx.fillRect(0, 0, snap.width, snap.height);
        sctx.drawImage(main, 0, 0); sctx.drawImage(temp, 0, 0);
        
        const base64Image = snap.toDataURL('image/jpeg', 0.8).split(',')[1];

        const res = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${apiKey}`, {
            method: 'POST', headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ contents: [{ parts: [{ text: userPrompt }, { inline_data: { mime_type: "image/jpeg", data: base64Image } }] }] })
        });
        const data = await res.json();

        if (data.error) {
            alert("AI Error: " + data.error.message);
            if(data.error.code === 400 || data.error.c
