<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <link rel="manifest" href="manifest.json">
    <title>STUDIO69</title>
    <style>
        :root { --bg: #050505; --panel: rgba(15, 15, 15, 0.95); --border: #333; --neon: #00ffff; --active-bg: rgba(0, 255, 255, 0.1); }
        * { margin: 0; padding: 0; box-sizing: border-box; user-select: none; -webkit-user-select: none; touch-action: none; font-family: monospace; }
        body { background: var(--bg); height: 100vh; width: 100vw; overflow: hidden; color: #666; }
        
        #viewport { position: absolute; top: 0; left: 0; width: 100%; height: 100%; transform-origin: 0 0; }
        canvas { position: absolute; top: 0; left: 0; display: block; }
        #temp-canvas { z-index: 20; }
        
        .dock {
            position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%); width: 96%; max-width: 500px;
            display: flex; justify-content: space-between; background: var(--panel); padding: 10px;
            border-radius: 40px; border: 1px solid var(--border); z-index: 9999;
        }
        .dock-btn {
            flex: 1; height: 50px; margin: 0 4px; border-radius: 25px; border: 1px solid var(--border);
            background: #111; display: flex; align-items: center; justify-content: center;
            color: #888; font-size: 11px; font-weight: 900; transition: 0.2s; cursor: pointer;
        }
        .active-btn { border-color: var(--neon) !important; color: var(--neon) !important; background: var(--active-bg); box-shadow: 0 0 15px rgba(0, 255, 255, 0.2); }
        
        .overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.8); z-index: 9000; display: none;
            align-items: center; justify-content: center; flex-direction: column;
        }
        .menu-box {
            background: var(--panel); border: 1px solid var(--border); padding: 20px;
            border-radius: 20px; width: 90%; max-width: 400px; display: flex; flex-direction: column; gap: 10px;
        }
        .menu-row { display: flex; gap: 10px; width: 100%; }
        .menu-item {
            flex: 1; height: 50px; background: #111; border: 1px solid var(--border); border-radius: 12px;
            display: flex; align-items: center; justify-content: center; color: #aaa; cursor: pointer; font-weight: bold;
        }
        .grid-3x4 { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; width: 100%; }
        
        input[type="range"] { width: 100%; margin: 10px 0; height: 20px; border-radius: 10px; -webkit-appearance: none; outline: none; background: #222; }
        input[type="range"]::-webkit-slider-thumb { -webkit-appearance: none; width: 24px; height: 24px; border-radius: 50%; background: #fff; border: 2px solid #000; cursor: pointer; }
        input[type="text"], select { width: 100%; height: 40px; background: #111; color: #fff; border: 1px solid #444; padding: 10px; margin-bottom: 15px; }
        .hidden-file { display: none; }

        /* Hidden Transform Bar - Only pops up during placement */
        #ui-transform-bar {
            display: none; 
            position: fixed; 
            bottom: 100px; 
            left: 50%; 
            transform: translateX(-50%); 
            z-index: 9999; 
            gap: 10px; 
            width: 90%; 
            max-width: 450px;
        }
    </style>
</head>
<body>

    <div id="viewport">
        <canvas id="main-canvas"></canvas>
        <canvas id="temp-canvas"></canvas>
    </div>

    <!-- DOCK -->
    <div class="dock">
        <div class="dock-btn" id="btn-menu" onclick="toggleOverlay('menu')">MENU</div>
        <div class="dock-btn" id="btn-tools" onclick="toggleOverlay('tools')">TOOLS</div>
        <div class="dock-btn" id="btn-color" onclick="toggleOverlay('color')">COLOR</div>
        <div class="dock-btn" onclick="triggerQSave()">QSAVE</div>
    </div>

    <!-- MENU OVERLAY -->
    <div class="overlay" id="overlay-menu">
        <div class="menu-box">
            <div class="menu-row">
                <div class="menu-item" onclick="document.getElementById('load-file').click()">LOAD PIC</div>
                <div class="menu-item" onclick="document.getElementById('import-file').click()">IMPORT</div>
            </div>
            <div class="menu-item" onclick="triggerSave()">EXPORT SAVE</div>
            <div class="menu-item" onclick="toggleOverlay('vault')">VAULTS</div>
        </div>
    </div>

    <!-- TOOLS OVERLAY -->
    <div class="overlay" id="overlay-tools">
        <div class="menu-box">
            <div class="grid-3x4">
                <div class="menu-item tool-btn" onclick="selectTool(this, 'PAINTBRUSH')">BRUSH</div>
                <div class="menu-item tool-btn" onclick="selectTool(this, 'ERASER')">ERASER</div>
                <div class="menu-item tool-btn" onclick="selectTool(this, 'PICKER')">PICKER</div>
                <div class="menu-item tool-btn" onclick="selectTool(this, 'FILL')">FILL</div>
                <div class="menu-item tool-btn" onclick="selectTool(this, 'CUT')">CUT</div>
                <div class="menu-item tool-btn" onclick="selectTool(this, 'COPY')">COPY</div>
                <div class="menu-item tool-btn" onclick="selectTool(this, 'PASTE')">PASTE</div>
                <div class="menu-item tool-btn" onclick="selectTool(this, 'SMOOTH')">SMOOTH</div>
                <div class="menu-item tool-btn" onclick="openTextMenu()">TEXT</div>
                <div class="menu-item tool-btn" onclick="performUndo()">UNDO</div>
                <div class="menu-item tool-btn" onclick="triggerAI()" style="color:#f0f;">AI</div>
                <div class="menu-item tool-btn" onclick="performReflector()">MIRROR</div>
            </div>
        </div>
    </div>

    <!-- COLOR OVERLAY -->
    <div class="overlay" id="overlay-color">
        <div class="menu-box" style="align-items: center;">
            <canvas id="brush-preview" width="100" height="100" style="border-radius: 50%; border: 2px solid #fff; margin-bottom: 10px;"></canvas>
            <div style="width: 100%; text-align: left; color: #888; font-size: 10px; margin-top:10px;">MASTER RAINBOW</div>
            <input type="range" id="slider-hue" min="0" max="360" value="180" style="background: linear-gradient(to right, #f00, #ff0, #0f0, #0ff, #00f, #f0f, #f00);">
            <div style="width: 100%; text-align: left; color: #888; font-size: 10px;">SHADES (DARK TO LIGHT)</div>
            <input type="range" id="slider-light" min="0" max="100" value="50">
            <div style="width: 100%; text-align: left; color: #888; font-size: 10px;">BRUSH SIZE</div>
            <input type="range" id="slider-size" min="1" max="100" value="20">
        </div>
    </div>

    <!-- VAULT OVERLAY -->
    <div class="overlay" id="overlay-vault">
        <div class="menu-box">
            <div class="menu-row">
                <div class="menu-item" style="flex-direction:column; padding:10px; height:120px;" onclick="loadVault(0)">
                    <img id="vault-img-0" src="" style="width:100%; height:70px; object-fit:contain; background:#000;">
                    <span style="font-size:10px; margin-top:5px;">LOAD QSAVE 1</span>
                </div>
                <div class="menu-item" style="flex-direction:column; padding:10px; height:120px;" onclick="loadVault(1)">
                    <img id="vault-img-1" src="" style="width:100%; height:70px; object-fit:contain; background:#000;">
                    <span style="font-size:10px; margin-top:5px;">LOAD QSAVE 2</span>
                </div>
            </div>
        </div>
    </div>

    <!-- TEXT MENU UI -->
    <div class="overlay" id="ui-text" style="z-index:9999;">
        <div class="menu-box">
            <input type="text" id="text-input" placeholder="Type here...">
            <div style="color:#888; font-size:10px;">FONT STYLE</div>
            <select id="text-font">
                <option value="monospace">Typewriter</option>
                <option value="cursive">Cursive / Script</option>
                <option value="sans-serif">Clean Bold</option>
            </select>
            <div style="color:#888; font-size:10px;">MANUAL SCALE</div>
            <input type="range" id="text-scale-slider" min="0.1" max="5" step="0.01" value="1" oninput="textObj.scale = parseFloat(this.value); drawTextPreview();">
            <div style="color:#888; font-size:10px;">ROTATION</div>
            <input type="range" id="text-rotate" min="0" max="360" value="0" oninput="drawTextPreview()">
            <div class="menu-row">
                <div class="menu-item" onclick="startTextSticker()" style="color:#0ff;">PLACE</div>
                <div class="menu-item" onclick="cancelTextSticker()">CANCEL</div>
            </div>
        </div>
    </div>

    <!-- TRANSFORM BAR (Shows Flip/Stamp options during placement) -->
    <div id="ui-transform-bar">
        <div class="dock-btn" onclick="textObj.fX *= -1; drawTextPreview();" style="flex:0.5;">FLIP X</div>
        <div class="dock-btn" onclick="textObj.fY *= -1; drawTextPreview();" style="flex:0.5;">FLIP Y</div>
        <div class="dock-btn" onclick="confirmTextSticker()" style="background:#00ffff; color:#000; font-weight:bold;">STAMP</div>
        <div class="dock-btn" onclick="cancelTextSticker()" style="background:#333; flex:0.3;">X</div>
    </div>

    <input type="file" id="load-file" class="hidden-file" accept="image/*">
    <input type="file" id="import-file" class="hidden-file" accept="image/*">
    <script>
    const app = { activeTool: null, penColor: '#00ffff', penSize: 20, scale: 1, panX: 0, panY: 0, undo: [], vaults: [], vaultIdx: 0 };
    const viewport = document.getElementById('viewport'), main = document.getElementById('main-canvas'), temp = document.getElementById('temp-canvas');
    const mctx = main.getContext('2d'), tctx = temp.getContext('2d', { willReadFrequently: true });
    let currentOpenMenu = null;

    // --- OVERLAY & TOOLS LOGIC ---
    function toggleOverlay(id) {
        document.querySelectorAll('.overlay').forEach(el => el.style.display = 'none');
        document.querySelectorAll('.dock-btn').forEach(btn => btn.classList.remove('active-btn'));
        if (id === currentOpenMenu) { currentOpenMenu = null; } 
        else if (id) { 
            document.getElementById('overlay-' + id).style.display = 'flex'; 
            if(document.getElementById('btn-' + id)) document.getElementById('btn-' + id).classList.add('active-btn'); 
            currentOpenMenu = id; 
        }
        if (app.activeTool && currentOpenMenu !== 'tools') document.getElementById('btn-tools').classList.add('active-btn');
    }

    function selectTool(btn, tool) {
        if (app.activeTool === tool) { app.activeTool = null; btn.classList.remove('active-btn'); } 
        else {
            document.querySelectorAll('.tool-btn').forEach(b => b.classList.remove('active-btn'));
            btn.classList.add('active-btn'); app.activeTool = tool;
        }
    }

    // --- TRANSFORM & STICKER ENGINE ---
    let textObj = { txt: '', font: '', rot: 0, x: 100, y: 100, scale: 1, img: null, fX: 1, fY: 1 };

    function openTextMenu() {
        document.getElementById('ui-text').style.display = 'flex';
        toggleOverlay(null); window.dragBackup = tctx.getImageData(0,0,temp.width,temp.height);
    }

    function startTextSticker() {
        textObj.txt = document.getElementById('text-input').value; 
        textObj.font = document.getElementById('text-font').value; 
        textObj.rot = parseInt(document.getElementById('text-rotate').value);
        if(!textObj.txt) return cancelTextSticker();
        document.getElementById('ui-text').style.display = 'none'; 
        document.getElementById('ui-transform-bar').style.display = 'flex';
        app.activeTool = 'TEXT_PLACE';
        const rect = temp.getBoundingClientRect();
        textObj.x = (window.innerWidth/2 - rect.left) / app.scale; 
        textObj.y = (window.innerHeight/2 - rect.top) / app.scale; 
        textObj.scale = 1; textObj.img = null; drawTextPreview();
    }

    function cancelTextSticker() {
        document.getElementById('ui-text').style.display = 'none'; 
        document.getElementById('ui-transform-bar').style.display = 'none';
        app.activeTool = null; 
        tctx.putImageData(window.dragBackup, 0, 0);
        // Reset state for next time
        textObj.img = null; textObj.scale = 1; textObj.rot = 0; textObj.fX = 1; textObj.fY = 1;
    }

    function drawTextPreview() {
        if(app.activeTool !== 'TEXT_PLACE') return;
        tctx.putImageData(window.dragBackup, 0, 0);
        tctx.save(); 
        tctx.translate(textObj.x, textObj.y); 
        tctx.rotate(textObj.rot * Math.PI / 180);
        tctx.scale(textObj.scale * textObj.fX, textObj.scale * textObj.fY);
        if (textObj.img) {
            tctx.drawImage(textObj.img, -textObj.img.width/2, -textObj.img.height/2);
        } else {
            tctx.font = `${app.penSize * 2 * Math.abs(textObj.scale)}px ${textObj.font}`; 
            tctx.fillStyle = app.penColor; tctx.textAlign = "center"; tctx.fillText(textObj.txt, 0, 0);
        }
        tctx.restore();
    }

    function confirmTextSticker() {
        document.getElementById('ui-transform-bar').style.display = 'none'; 
        pushUndo(); 
        app.activeTool = null; 
        // Reset transforms so next import is clean
        textObj.img = null; textObj.scale = 1; textObj.rot = 0; textObj.fX = 1; textObj.fY = 1;
        document.querySelectorAll('.tool-btn').forEach(b => b.classList.remove('active-btn'));
        toggleOverlay(null);
    }

    // --- GEMINI AI ENGINE ---
    async function triggerAI() {
        let apiKey = localStorage.getItem('gemini_api_key');
        if (!apiKey) { apiKey = prompt("Google Gemini API Key:"); if (apiKey) localStorage.setItem('gemini_api_key', apiKey); else return; }
        const promptText = prompt("Ask the AI about your drawing:", "Describe this picture."); if (!promptText) return;
        document.getElementById('btn-tools').innerText = 'THINK...';
        try {
            const snap = document.createElement('canvas'); snap.width = main.width; snap.height = main.height;
            const sctx = snap.getContext('2d'); sctx.fillStyle = '#fff'; sctx.fillRect(0,0,snap.width,snap.height);
            sctx.drawImage(main,0,0); sctx.drawImage(temp,0,0);
            const b64 = snap.toDataURL('image/jpeg', 0.8).split(',')[1];
            const res = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${apiKey}`, {
                method: 'POST', headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ contents: [{ parts: [{ text: promptText }, { inline_data: { mime_type: "image/jpeg", data: b64 } }] }] })
            });
            const data = await res.json();
            if (data.error) { alert("AI Error: " + data.error.message); } 
            else alert("GEMINI:\n\n" + data.candidates[0].content.parts[0].text);
        } catch (e) { alert("Network Error."); }
        document.getElementById('btn-tools').innerText = 'TOOLS';
    }

    // --- COLOR & FILE CORE ---
    const hueSlider = document.getElementById('slider-hue'), lightSlider = document.getElementById('slider-light'), sizeSlider = document.getElementById('slider-size');
    hueSlider.addEventListener('input', updateColor); lightSlider.addEventListener('input', updateColor); sizeSlider.addEventListener('input', updateColor);

    function updateColor() {
        app.penSize = parseInt(sizeSlider.value); app.penColor = `hsl(${hueSlider.value}, 100%, ${lightSlider.value}%)`;
        lightSlider.style.background = `linear-gradient(to right, black, hsl(${hueSlider.value}, 100%, 50%), white)`;
        document.getElementById('btn-color').style.background = app.penColor; 
        document.getElementById('btn-color').style.color = (lightSlider.value > 50) ? '#000' : '#fff';
        const pCtx = document.getElementById('brush-preview').getContext('2d');
        pCtx.clearRect(0,0,100,100); pCtx.beginPath(); pCtx.arc(50, 50, app.penSize / 2, 0, Math.PI*2); pCtx.fillStyle = app.penColor; pCtx.fill();
    }

    function rgbToHsl(r, g, b) {
        r /= 255; g /= 255; b /= 255; const max = Math.max(r, g, b), min = Math.min(r, g, b); let h, s, l = (max + min) / 2;
        if (max === min) h = s = 0; else {
            const d = max - min; s = l > 0.5 ? d / (2 - max - min) : d / (max + min);
            if (max === r) h = (g - b) / d + (g < b ? 6 : 0); 
            else if (max === g) h = (b - r) / d + 2; 
            else h = (r - g) / d + 4; h /= 6;
        }
        return { h: Math.round(h * 360), l: Math.round(l * 100) };
    }

    function applyFitMath(imgWidth, imgHeight) {
        main.width = temp.width = imgWidth; main.height = temp.height = imgHeight;
        main.style.width = temp.style.width = imgWidth+'px'; main.style.height = temp.style.height = imgHeight+'px';
        app.scale = Math.min(window.innerWidth/imgWidth, window.innerHeight/imgHeight);
        app.panX = (window.innerWidth - imgWidth * app.scale) / 2; app.panY = (window.innerHeight - imgHeight * app.scale) / 2;
        viewport.style.transform = `translate(${app.panX}px, ${app.panY}px) scale(${app.scale})`;
    }

    function pushUndo() { if(app.undo.length >= 10) app.undo.shift(); app.undo.push(temp.toDataURL()); }
    function performUndo() { if(app.undo.length <= 1) return; app.undo.pop(); const img = new Image(); img.onload = () => { tctx.clearRect(0,0,temp.width,temp.height); tctx.drawImage(img,0,0); }; img.src = app.undo[app.undo.length-1]; }

    function triggerSave() {
        let name = prompt("Name your exported picture:", "Studio_Export"); if (!name) return;
        const comp = document.createElement('canvas'); comp.width = main.width; comp.height = main.height;
        const ctx = comp.getContext('2d'); ctx.drawImage(main,0,0); ctx.drawImage(temp,0,0);
        const l = document.createElement('a'); l.download = name + '.png'; l.href = comp.toDataURL(); l.click(); toggleOverlay(null);
    }

    function triggerQSave() {
        mctx.drawImage(temp,0,0); tctx.clearRect(0,0,temp.width,temp.height); pushUndo();
        app.vaultIdx = app.vaultIdx === 0 ? 1 : 0;
        app.vaults[app.vaultIdx] = main.toDataURL('image/jpeg', 0.8);
        localStorage.setItem('v' + app.vaultIdx, app.vaults[app.vaultIdx]);
        document.getElementById('vault-img-' + app.vaultIdx).src = app.vaults[app.vaultIdx];
    }

    function loadVault(i) {
        if(!app.vaults[i]) return alert("Vault empty!");
        const img = new Image(); img.onload = () => { 
            applyFitMath(img.width, img.height); 
            mctx.clearRect(
